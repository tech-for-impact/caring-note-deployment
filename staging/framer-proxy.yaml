apiVersion: v1
kind: ConfigMap
metadata:
  name: framer-proxy-config
  namespace: caring-note-staging
data:
  default.conf: |
    server {
      listen 80;
      location / {
        rewrite ^/about(.*)$ /$1 break;
        proxy_pass https://caring-note.framer.website/;
        proxy_set_header Host caring-note.framer.website;
        proxy_ssl_server_name on;
        proxy_ssl_name caring-note.framer.website;
        proxy_set_header Accept-Encoding "";
        sub_filter 'https://caring-note.framer.website' 'https://stage.caringnote.co.kr';
        sub_filter_once off;
        sub_filter_types text/html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: framer-proxy
  namespace: caring-note-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: framer-proxy
  template:
    metadata:
      labels:
        app: framer-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: framer-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: framer-proxy
  namespace: caring-note-staging
spec:
  selector:
    app: framer-proxy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
